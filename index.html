<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мир Электроники | Портал</title>
    <style>
        :root {
            --primary-bg: #f4f7f6;
            --card-tech: #3498db; /* Синий цвет */
            --card-my: #2ecc71;   /* Зеленый цвет */
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        header {
            text-align: center;
            margin-bottom: 40px;
        }

        /* Сетка для карточек */
        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
        }

        /* Сама карточка-квадрат */
        .category-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-top: 8px solid;
            transition: transform 0.2s;
        }

        .category-card:hover {
            transform: translateY(-5px);
        }

        /* Цвета для разных разделов */
        .tech-creative { border-top-color: var(--card-tech); }
        .my-projects { border-top-color: var(--card-my); }

        /* Шапка внутри карточки: иконка + заголовок */
        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        /* Круглая картинка-значок */
        .section-icon {
            width: 65px;
            height: 65px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #eee;
            background-color: #fff;
        }

        h2 { margin: 0; font-size: 1.4rem; color: #333; }

        /* Список ссылок внутри */
        .project-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .project-list li {
            margin-bottom: 12px;
        }

        .project-list a {
            text-decoration: none;
            color: #555;
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 8px;
            background: #f9f9f9;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .project-list a:hover {
            background: #fff;
            color: #000;
            border-color: #ddd;
            padding-left: 18px;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* Иконка-инструмент перед ссылкой */
        .project-list a::before {
            content: "⚙️";
            margin-right: 12px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <header>
        <h1>Творческая лаборатория электроники</h1>
        <p>Инженерный портал для юных техников</p>
    </header>

    <div class="grid-container">
        
        <!-- БЛОК 1: ТЕХНИЧЕСКОЕ ТВОРЧЕСТВО -->
        <section class="category-card tech-creative">
            <div class="card-header">
                <!-- Путь к картинке (замените на свои файлы позже) -->
                <img src="img/creative-icon.png" alt="🛠" class="section-icon">
                <h2>Техническое творчество</h2>
            </div>
            <ul class="project-list">
                <li><a href="https://github.io">Робототехника</a></li>
                <li><a href="https://github.io">Схемотехника</a></li>
                <li><a href="https://github.io">Программирование МК</a></li>
            </ul>
        </section>

        <!-- БЛОК 2: МОИ ПРОЕКТЫ -->
        <section class="category-card my-projects">
            <div class="card-header">
                <img src="img/projects-icon.png" alt="🚀" class="section-icon">
                <h2>Мои проекты</h2>
            </div>
            <ul class="project-list">
                <li><a href="https://github.io">Система "Умный дом"</a></li>
                <li><a href="https://github.io">Блок питания 0-30В</a></li>
            </ul>
        </section>

    </div>

</body>
</html>
