<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>eaststandart - Projects</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; background: #121212; color: #e0e0e0; max-width: 900px; margin: 0 auto; padding: 40px 20px; }
        h1 { border-bottom: 1px solid #333; padding-bottom: 10px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; margin-top: 30px; }
        .card { background: #1e1e1e; border: 1px solid #333; border-radius: 12px; transition: 0.3s; text-decoration: none; color: inherit; display: block; overflow: hidden; }
        .card:hover { transform: translateY(-5px); border-color: #555; }
        .card-img { height: 160px; background: #252525; display: flex; align-items: center; justify-content: center; font-size: 40px; }
        .card-content { padding: 15px; }
        .card h3 { margin: 0 0 10px 0; color: #58a6ff; }
        .card p { font-size: 14px; line-height: 1.5; color: #8b949e; }
    </style>
</head>
<body>
    <h1>eaststandart Projects</h1>
    <div class="grid">
        <a href="radio.html" class="card">
            <div class="card-img">📻</div>
            <div class="card-content">
                <h3>Cyber-Radio Deck</h3>
                <p>PicoCalc + RDA5807. Усилитель на 3-х советских транзисторах и трансформаторе.</p>
            </div>
        </a>
        <a href="#" class="card">
            <div class="card-img">⚙️</div>
            <div class="card-content">
                <h3>Z80 ASM Lab</h3>
                <p>Эксперименты с ассемблером Z80 в эмуляторе Fuse и управление портами.</p>
            </div>
        </a>
    </div>
</body>
</html>
