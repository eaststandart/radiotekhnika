<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Мир Электроники | Портал</title>
    <style>
        :root {
            --primary-bg: #f4f7f6;
            --card-tech: #3498db; 
            --card-my: #2ecc71;   
            --text-color: #2c3e50;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--primary-bg);
            color: var(--text-color);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }

        /* Шапка сайта с главной иконкой */
        header {
            text-align: center;
            margin-top: 20px;
            margin-bottom: 40px;
        }

        /* Главная круглая иконка (как в Telegram) */
        .main-avatar {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            object-fit: cover;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 15px;
            transition: transform 0.3s ease;
        }

        .main-avatar:hover {
            transform: scale(1.05); /* Легкое увеличение при наведении */
        }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 25px;
            width: 100%;
            max-width: 1000px;
        }

        .category-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            border-top: 8px solid;
            transition: transform 0.2s;
        }

        .category-card:hover {
            transform: translateY(-5px);
        }

        .tech-creative { border-top-color: var(--card-tech); }
        .my-projects { border-top-color: var(--card-my); }

        .card-header {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 20px;
        }

        /* Значки разделов внутри карточек */
        .section-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            object-fit: cover;
            border: 2px solid #eee;
            background: #fff;
        }

        h1 { margin: 10px 0; font-size: 2rem; }
        h2 { margin: 0; font-size: 1.3rem; color: #333; }
        header p { margin: 0; color: #7f8c8d; font-size: 1.1rem; }

        .project-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .project-list li {
            margin-bottom: 12px;
        }

        .project-list a {
            text-decoration: none;
            color: #555;
            display: flex;
            align-items: center;
            padding: 10px;
            border-radius: 8px;
            background: #f9f9f9;
            transition: 0.2s;
            border: 1px solid transparent;
        }

        .project-list a:hover {
            background: #fff;
            color: #000;
            border-color: #ddd;
            padding-left: 18px;
        }

        .project-list a::before {
            content: "⚡";
            margin-right: 12px;
        }
    </style>
</head>
<body>

    <header>
        <!-- ГЛАВНАЯ ИКОНКА ПОРТАЛА -->
        <img src="img/projects-icon.png" alt="Логотип" class="main-avatar">
        
        <h1>Творческая лаборатория электроники</h1>
        <p>Инженерный портал для юных техников</p>
    </header>

    <div class="grid-container">
        
        <!-- БЛОК 1 -->
        <section class="category-card tech-creative">
            <div class="card-header">
                <img src="img/creative-icon.png" alt="🛠" class="section-icon">
                <h2>Техническое творчество</h2>
            </div>
            <ul class="project-list">
                <li><a href="https://github.io">Робототехника</a></li>
                <li><a href="https://github.io">Схемотехника</a></li>
            </ul>
        </section>

        <!-- БЛОК 2 -->
        <section class="category-card my-projects">
            <div class="card-header">
                <img src="img/projects-icon.png" alt="🚀" class="section-icon">
                <h2>Мои проекты</h2>
            </div>
            <ul class="project-list">
                <li><a href="https://github.io">Умный дом</a></li>
                <li><a href="https://github.io">Блок питания</a></li>
            </ul>
        </section>

    </div>

</body>
</html>
