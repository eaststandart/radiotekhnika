<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8">
    <title>Мои проекты</title>
    <style>
        body { font-family: sans-serif; background: #f0f0f0; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .card { background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .card img { width: 100%; height: 200px; object-fit: cover; background: #ddd; }
        .card-content { padding: 15px; }
        h3 { margin-top: 0; color: #333; }
        .tag { background: #e1f5fe; color: #01579b; padding: 3px 8px; border-radius: 4px; font-size: 12px; }
    </style>
</head>
<body>
    <h1>Мои проекты</h1>
    <div class="grid">
        <!-- Карточка твоего радио -->
        <div class="card">
            <img src="https://placeholder.com" alt="Project Image">
            <div class="card-content">
                <span class="tag">PicoCalc</span>
                <h3>Cyber-Radio Deck</h3>
                <p>Радио на RDA5807 с усилителем на советских транзисторах и трансформаторе.</p>
            </div>
        </div>
    </div>
</body>
</html>
