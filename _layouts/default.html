<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ page.title }}</title>
    <link rel="icon" type="image/png" href="/favicon.png">
    <link rel="stylesheet" href="/style.css">
</head>
<body>

    <div class="content-wrapper">
        <a href="/" class="back-link">← Назад на портал</a>
        <h1>{{ page.title }}</h1> 

        <div class="main-content">
            {{ content }}
        </div>

    <!-- Блок тегов -->
    {% if page.tags %}
    <div class="tag-container">
        <strong>Теги:</strong>
        {% for tag in page.tags %}
        <span class="tag-item">{{ tag }}</span>
        {% endfor %}
    </div>
    {% endif %}
        
    <!-- Блок источников в одну линию -->
{% if page.sources %}
<div class="sources-inline">
    <strong>Источники:</strong> 
    <div class="sources-content">
        {{ page.sources | markdownify }}
    </div>
</div>
{% endif %}

        <footer class="license-footer">
            Материалы доступны по лицензии <a href="/LICENSE">CC BY 4.0</a>. 
            Авторство: <strong>eaststandart.github.io</strong>
        </footer>
    </div>

</body>
</html>
